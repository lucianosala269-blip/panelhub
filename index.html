<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Canvas Resize</title>
    <style>
        /* Estilos básicos para asegurar que los elementos ocupen el viewport */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #canvas, #canvas_border, #gradient, #webview_content {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <!-- Elementos referenciados en la función resizeCanvas -->
    <canvas id="canvas"></canvas>
    <div id="canvas_border"></div>
    <div id="gradient"></div>
    <div id="webview_content"></div>

    <script>
        // Función resizeCanvas tal cual fue proporcionada
        function resizeCanvas(informC) {
            let iw = window.innerWidth;
            let ih = window.innerHeight;
            let canvas = document.getElementById('canvas');
            let border = document.getElementById('canvas_border');
            canvas.width = iw * window.devicePixelRatio;
            canvas.height = ih * window.devicePixelRatio;
            border.style.marginTop = '0px';
            let gradient = document.getElementById('gradient');
            let webViewContent = document.getElementById("webview_content");
            [gradient, webViewContent].forEach(e => {
                if (e) {
                    e.style.left = '0px';
                }
            });
            [canvas, gradient, webViewContent].forEach(e => {
                if (e) {
                    e.style.width = iw + 'px';
                    e.style.height = ih + 'px';
                    e.style.borderRadius = '0px';
                }
            });
        }

        // Llamada inicial a la función para ajustar al cargar la página
        resizeCanvas();
        // Llamada adicional al cambiar el tamaño de la ventana
        window.addEventListener('resize', () => resizeCanvas());
    </script>
</body>
</html>
